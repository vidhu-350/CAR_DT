<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Physics Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 100;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
        }
        
        #debug {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    
    <div id="controls">
        <strong>Controls:</strong><br>
        ↑ Arrow Key: Accelerate<br>
        ↓ Arrow Key: Reverse<br>
        ← → Arrow Keys: Steer<br>
        Mouse: Look around
    </div>
    
    <div id="debug">Initializing...</div>

    <script src="js/three.min.js"></script>
    <script src="js/GLTFLoader.min.js"></script>
    <script src="js/ammo.js"></script> 
    <script src="script.js"></script>
</body>
</html>
